services:
  - type: web
    name: claims-processing-agent
    runtime: python
    buildCommand: python build.py
    startCommand: uvicorn src.orchestrator:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: OPENROUTER_API_KEY
        sync: false
